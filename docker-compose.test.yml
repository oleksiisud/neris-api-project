# Overlay on top of docker-compose.yml to swap the real LLM for a fast mock.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
#
# The mock returns a hardcoded INVALID response so you can verify the full
# pipeline (API → Redis → Worker → LLM → response) without a real GGUF model.

services:
  llm:
    build:
      context: ./test/mock_llm
    volumes: []
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

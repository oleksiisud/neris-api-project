services:
  api:
    build:
      context: ./api
    container_name: narrative-api
    ports:
      - "8000:8000"
    environment:
      - REQUEST_TIMEOUT=120
      - LLM_URL=http://llm:8080/v1/chat/completions
    volumes:
      - ./api:/app
      - ./llm/grammars:/app/grammars
    networks:
      - narrative-network
    restart: unless-stopped


  llm:
    build:
      context: ./llm
    container_name: narrative-llm
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    ports:
      - "8080:8080"
    volumes:
      - ./llm/models:/app/models
      - ./llm/grammars:/app/grammars
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - narrative-network
    restart: unless-stopped

networks:
  narrative-network:
    driver: bridge

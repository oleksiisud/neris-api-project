apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-api
  namespace: neris-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: validation-api
  template:
    metadata:
      labels:
        app: validation-api
    spec:
      containers:
      - name: api
        image: 103524369203.dkr.ecr.us-east-1.amazonaws.com/neris-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: neris-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
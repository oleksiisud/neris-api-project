apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: validation-api-hpa
  namespace: neris-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: validation-api

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: validation-worker-hpa
  namespace: neris-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: validation-worker

  minReplicas: 1
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
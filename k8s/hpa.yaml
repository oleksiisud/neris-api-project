version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      LLM_URL: http://llm:8080/completion
    depends_on:
      - redis
      - llm
  llm:
    build: ./llm
    ports:
      - "8080:8080"
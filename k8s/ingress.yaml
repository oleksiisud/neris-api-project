apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: validation-api-ingress
  namespace: neris-ai
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: validation-api-service
            port:
              number: 8000
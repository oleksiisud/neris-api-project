apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-deployment
  namespace: neris-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      containers:
      - name: llama-cpp
        image: 103524369203.dkr.ecr.us-east-1.amazonaws.com/neris-llm:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "2"
            memory: "6Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: llm-model-pvc
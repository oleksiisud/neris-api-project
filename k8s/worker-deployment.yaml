apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-worker
  namespace: neris-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: validation-worker
  template:
    metadata:
      labels:
        app: validation-worker
    spec:
      containers:
      - name: worker
        image: 103524369203.dkr.ecr.us-east-1.amazonaws.com/neris-worker:latest
        envFrom:
        - secretRef:
            name: neris-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "from redis import Redis; import os; r = Redis(host=os.getenv('REDIS_HOST','redis'), port=int(os.getenv('REDIS_PORT',6379))); r.ping()"
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3